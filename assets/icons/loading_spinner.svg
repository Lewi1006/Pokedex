<svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .spin {
        transform-origin: 100px 100px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <g class="spin">

    <!-- outer circle -->
    <circle cx="100" cy="100" r="90" fill="white" stroke="#444" stroke-width="6"></circle>

    <!-- top half (light gray) -->
    <path d="M10 100 A90 90 0 0 1 190 100" fill="#d9d9d9" stroke="#444" stroke-width="6" stroke-linecap="round"></path>

    <!-- middle line -->
    <line x1="10" y1="100" x2="190" y2="100" stroke="#444" stroke-width="6" stroke-linecap="round"></line>

    <!-- center button -->
    <circle cx="100" cy="100" r="22" fill="white" stroke="#444" stroke-width="6"></circle>

    <circle cx="100" cy="100" r="10" fill="#eeeeee"></circle>

  </g>
</svg>