<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokadex</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/icons/pokemon_icon.svg"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/colors.css" />
    <link rel="stylesheet" href="./styles/card.css" />
    <link rel="stylesheet" href="./styles/standard.css" />

    <script src="script.js" defer></script>
    <script src="./scripts/template.js" defer></script>
  </head>
  <body onload="init()">
    <header>
      <div class="content">
        <div class="header-left">
          <img src="./assets/icons/pokemon_icon.svg" alt="pokemon logo" />
          <p>Pokedex</p>
        </div>
        <div class="header-right">
          <!-- <label for="search">Search Pokemon</label> -->
          <input 
            type="search"
            id="pokemon-name "
            data-id="search-input"
            placeholder="search"
            oninput="filterAndShowNames(this.value)"
          />
          <!-- <button onclick="">search</button> -->
        </div>
      </div>
    </header>

    <main data-id="content">
      <section class="cards-section">
        <div class="content">
          <div id="pkm-card-container">
            <!-- JS -->
          </div>

          
        </div>
      </section>

      <section class="loading-section">
        <div class="content">
          <button id="loading-button" data-id="load-more-button" onclick="loadMore()">Catch more</button>
          <div id="loader" class="loader"></div>
        </div>
      </section>
    </main>

    <dialog id="dialog" data-id="dialog" onclick="closeDialog()"></dialog>

    <footer>
      <div class="content">
        <div>
          <img src="./assets/icons/copyright.svg" alt="copyright"/>
          <p>2026</p>
        </div>
        <p>Leonie Wind</p>
      </div>
    </footer>
  </body>
</html>
