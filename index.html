<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokadex</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/icons/pokemon_icon.svg"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/colors.css" />
    <link rel="stylesheet" href="./styles/card.css" />
    <link rel="stylesheet" href="./styles/standard.css" />

    <script src="script.js" defer></script>
    <script src="./scripts/template.js" defer></script>
  </head>
  <body>
    <header>
      <div class="content">
        <div class="header-left">
          <img src="./assets/icons/pokemon_icon.svg" alt="pokemon logo" />
          <p>Pokadex</p>
        </div>
        <div class="header-right">
          <input type="search" placeholder="search" />
        </div>
      </div>
    </header>

    <main>
      <section class="cards-section">
        <div class="content">
          <div id="pkm-card">
            <div class="card-header">
              <h2 class="pkm-name">Bulbasur</h2>
              <p class="pkm-id">#001</p>
            </div>

            <div class="card-body">
              <div id="pkm-types"></div>

              <div id="pkm-img">
                <img src="" alt="" />
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <dialog></dialog>

    <footer></footer>
  </body>
</html>
